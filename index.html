<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="./manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volleyball Live Dashboard</title>
    <!-- Cache Control -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <link rel="stylesheet" href="styles.css?v=v1b2c3">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <div class="overlay"></div>

        <header class="match-header">
            <div class="league-info">PRO VOLLEYBALL CHAMPIONSHIP</div>
            <div class="match-status">SET 4 - LIVE</div>
        </header>

        <main class="scoreboard">
            <div class="team team-a">
                <div class="team-name">TITANS</div>
                <div class="sets">2</div>
                <div class="current-score" id="score-a">18</div>
                <div class="serve-indicator" id="serve-a">●</div>
            </div>

            <div class="score-divider">VS</div>

            <div class="team team-b">
                <div class="serve-indicator" id="serve-b"></div>
                <div class="current-score" id="score-b">15</div>
                <div class="sets">1</div>
                <div class="team-name">DRAGONS</div>
            </div>
        </main>

        <section class="stats-container">
            <div class="stats-card">
                <h3>MATCH LEADERS</h3>
                <div class="stats-grid" id="stats-grid">
                    <!-- Dynamic stats will be injected here -->
                </div>
            </div>
        </section>

        <footer class="ticker">
            <div class="ticker-content" id="ticker-text">
                TITANS lead 2-1 in sets... Dragons fighting back in the 4th set... Latest Point: Spike by J. Miller (Titans)...
            </div>
        </footer>
    </div>
    <script src="script.js?v=v1b2c3"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js')
          .then(function (reg) { console.log('[PWA] SW registered:', reg.scope); })
          .catch(function (err) { console.warn('[PWA] SW registration failed:', err); });
      });
    }
  </script>
</body>
</html>
